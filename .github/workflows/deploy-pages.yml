name: Deploy to GitHub Pages

# Static site (seating.html + jsQR.min.js + index redirect). Deployed via the
# official GitHub Actions Pages pipeline, which is more reliable than the legacy
# Jekyll builder. While previewing the Scanner feature, this also deploys the
# feature branch; drop that branch from the trigger once it's merged to main.
on:
  push:
    branches: ["main", "feature/scanner-tab"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
